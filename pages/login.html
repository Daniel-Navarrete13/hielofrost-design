<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HieloFrost — Iniciar Sesión</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <h1>HieloFrost</h1>
        <p>Sistema de Preventa</p>
      </div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Tipo de usuario</label>
          <select class="form-select" id="userRole" required>
            <option value="" disabled selected>Selecciona tu rol</option>
            <option value="gerente">Gerente</option>
            <option value="cliente">Cliente (Tienda)</option>
            <option value="chofer">Chofer</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Usuario o teléfono</label>
          <input type="text" class="form-input" id="username" placeholder="Ej: juan@frost.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-input" id="password" placeholder="Tu contraseña" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-md">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Iniciar Sesión
        </button>
      </form>

      <p class="text-sm text-muted mt-lg" style="text-align:center;">Demo: selecciona un rol y haz clic en Iniciar Sesión</p>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const role = document.getElementById('userRole').value;
      const routes = {
        gerente: 'gerente-dashboard.html',
        cliente: 'cliente-home.html',
        chofer: 'chofer-ruta.html'
      };
      if (routes[role]) {
        window.location.href = routes[role];
      }
      return false;
    }
  </script>
</body>
</html>
